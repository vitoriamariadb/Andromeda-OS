# /etc/sysctl.d/99-meow.conf
# Gerenciado pelo Ritual da Aurora — fonte de verdade em ~/.config/zsh/scripts/99-meow.conf
#
# Tuning para Pop OS Cosmic com zram em workload dev + jogos pesados.
# Sistema: Ryzen 7 5800X + 16GB RAM + zram zstd 15.5G.

# Pop OS define swappiness=10 em /etc/sysctl.d/10-pop-default-settings.conf,
# mas o pop-zram-config sobrescreve para 180 em runtime via sysctl -w.
# Travamos 180 aqui (prioridade 99) para que `sysctl --system` não regrida.
# Justificativa: com zram, escrever em swap (zstd) é mais barato que page reclaim agressivo.
vm.swappiness = 180

# Consistente com page_cluster=0 que o pop-zram-config aplica para zstd.
vm.page-cluster = 0

# Boost de page reclaim sob pressão de memória (Pop OS default 125; subindo).
# Reduz risco de stall entre início da pressão e earlyoom agir.
vm.watermark_scale_factor = 200
vm.watermark_boost_factor = 0

# Limpar dentry/inode caches mais agressivamente sob pressão (default 100).
vm.vfs_cache_pressure = 200
