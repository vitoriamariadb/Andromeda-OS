# /etc/gamemode.ini
# Gerenciado pelo Ritual da Aurora — fonte de verdade em ~/.config/zsh/scripts/gamemode.ini
#
# Tunings agressivos pra jogos pesados (Elden Ring, etc.).
# Ativado por gamemoderun %command% no Steam ou auto-detect via libgamemodeauto.
# Soft-realtime com governor=performance reaffirmation, ioprio melhor, renice.

[general]
# Renice o processo do jogo pra melhor responsividade do scheduler.
renice=10

# I/O priority class best-effort, prio 0 (mais alta entre best-effort).
ioprio=0

# Reaplica governor=performance enquanto o jogo roda (mesmo que system76-power já esteja em performance).
desiredgov=performance

# Soft-realtime se SCHED_ISO/SCHED_RR disponível; fallback automático pra renice.
softrealtime=auto

# Inibe screensaver/lock durante a sessão.
inhibit_screensaver=1

[gpu]
# Aceita responsabilidade pelo overclock leve da GPU durante o jogo (sem coolbits = no-op em NVIDIA).
apply_gpu_optimisations=accept-responsibility
gpu_device=0
# NVIDIA PowerMizer: 1 = Prefer Maximum Performance.
nv_powermizer_mode=1

[custom]
# Hooks opcionais — start/end. Vazios por padrão.
start=/bin/true
end=/bin/true
