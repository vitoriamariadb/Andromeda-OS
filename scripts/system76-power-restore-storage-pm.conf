# Drop-in pra com.system76.PowerDaemon.service
# Por que: o daemon seta link_power_management_policy=med_power_with_dipm em todos
# scsi_host no startup, matando charging USB e enumeração de pendrives. Esse
# ExecStartPost roda nosso script de reparo logo após o daemon iniciar, restaurando
# max_performance + USB on. Anti-regressão DEFINITIVA contra system76-power.
[Service]
ExecStartPost=/usr/local/bin/restore-storage-pm.sh
